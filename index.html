<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <meta content="default-src 'self' blob:; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; object-src 'none'; base-uri 'none'; form-action 'self'" http-equiv="Content-Security-Policy"/>
  <title>
   Zenless Zone Zero Analyzer
  </title>
  <link href="style.css" rel="stylesheet"/>
 </head>
 <body>
  <div class="page-shell">
   <h1>
    Zenless Zone Zero: Damage Inputs + “Diminishing Returns” Analyzer
   </h1>
   <div class="app-layout">
    <div class="panel-left">
     <div class="card mt-15">
      <div class="row">
       <label>
        Mode
        <select id="mode">
         <option value="standard">
          Standard
         </option>
         <option value="anomaly">
          Anomaly
         </option>
         <option value="rupture">
          Rupture
         </option>
        </select>
       </label>
      </div>
      <div class="row mt-10">
       <button class="btn" id="btnSave">
        Save
       </button>
       <button class="btn" id="btnLoad">
        Load
       </button>
       <button class="btn" id="btnExport">
        Export JSON
       </button>
       <button class="btn" id="btnImport">
        Import JSON
       </button>
       <input accept="application/json" class="hidden" id="importFile" type="file"/>
       <button class="btn" id="btnReset">
        Reset
       </button>
      </div>
     </div>

     <section class="section-block">
      <h2>
       Agent Stats
      </h2>
      <div class="card">
       <div class="form">
        <div class="form-row cols-3">
         <label>
          Agent Level
          <input id="agentLevel" min="1" step="1" type="number" value="60"/>
         </label>
         <label>
          Attribute
          <select id="attribute">
           <option value="physical">
            Physical
           </option>
           <option value="fire">
            Fire
           </option>
           <option value="ice">
            Ice
           </option>
           <option value="electric">
            Electric
           </option>
           <option value="ether">
            Ether
           </option>
          </select>
         </label>
         <label>
          ATK
          <input inputmode="decimal" id="atk" type="text" value="2000"/>
         </label>
        </div>
        <div class="form-row cols-2">
         <label>
          Crit Rate (%)
          <input inputmode="decimal" id="critRatePct" type="text" value="5"/>
         </label>
         <label>
          Crit DMG (%)
          <input inputmode="decimal" id="critDmgPct" type="text" value="50"/>
         </label>
        </div>
        <div class="form-row cols-3">
         <label>
          Generic DMG (%)
          <input inputmode="decimal" id="dmgGenericPct" type="text" value="0"/>
         </label>
         <label>
          Attribute DMG (%)
          <input inputmode="decimal" id="dmgAttrPct" type="text" value="0"/>
         </label>
         <label>
          Skill DMG (%)
          <input inputmode="decimal" id="dmgSkillTypePct" type="text" value="0"/>
         </label>
        </div>
        <div class="form-row cols-3">
         <label>
          PEN Ratio (%)
          <input inputmode="decimal" id="penRatioPct" type="text" value="0"/>
         </label>
         <label>
          PEN
          <input inputmode="decimal" id="penFlat" type="text" value="0"/>
         </label>
         <label>
          Skill Multiplier (%)
          <input inputmode="decimal" id="skillMultPct" type="text" value="100"/>
         </label>
         <label>
          DEF Ignore (%)
          <input inputmode="decimal" id="defIgnorePct" type="text" value="0"/>
         </label>
         <label>
          RES Ignore (%)
          <input inputmode="decimal" id="resIgnorePct" type="text" value="0"/>
         </label>
        </div>
       </div>
      </div>
     </section>

     <section class="section-block hidden" id="anomalySection">
      <h2 id="anomalyHeader">
       Agent Stats: Anomaly
      </h2>
      <div class="card" id="anomalyCard">
       <div class="form">
        <div class="form-row cols-2">
         <label>
          Anomaly Type
          <select id="anomType">
           <option selected="" value="auto">
            Auto
           </option>
           <option value="assault">
            Assault (Physical)
           </option>
           <option value="burn">
            Burn (Fire)
           </option>
           <option value="shock">
            Shock (Electric)
           </option>
           <option value="shatter">
            Shatter (Ice)
           </option>
           <option value="corruption">
            Corruption (Ether)
           </option>
          </select>
         </label>
         <label>
          Anomaly Proficiency
          <input inputmode="decimal" id="anomProf" type="text" value="100"/>
         </label>
        </div>
        <div class="form-row cols-3">
         <label>
          Anomaly DMG (%)
          <input inputmode="decimal" id="anomDmgPct" type="text" value="0"/>
         </label>
         <label class="hidden disorder-ui">
          Disorder DMG (%)
          <input inputmode="decimal" id="disorderDmgPct" type="text" value="0"/>
         </label>
        </div>
        <div class="form-row cols-3 hidden">
         <label>
          Tick Count (Override)
          <input id="anomTickCount" min="1" placeholder="Auto" step="1" type="number" value=""/>
         </label>
         <label>
          Tick Interval (Sec, Override)
          <input id="anomTickIntervalSec" min="0" placeholder="Auto" step="0.05" type="number" value=""/>
         </label>
        </div>
        <div class="form-row cols-3 hidden disorder-ui">
         <label>
          Disorder: Previous Anomaly
          <select id="disorderPrevType">
           <option selected="" value="auto">
            Auto (Current Anomaly Type)
           </option>
           <option value="burn">
            Burn
           </option>
           <option value="shock">
            Shock
           </option>
           <option value="corruption">
            Corruption
           </option>
           <option value="shatter">
            Frozen (Ice)
           </option>
           <option value="assault">
            Flinch (Physical)
           </option>
          </select>
         </label>
         <label class="disorder-ui">
          Disorder: Time Passed (Sec)
          <input id="disorderTimePassedSec" min="0" step="0.1" type="number" value="0"/>
         </label>
        </div>
       </div>
      </div>
     </section>

     <section class="section-block hidden" id="ruptureSection">
      <h2 id="ruptureHeader">
       Agent Stats: Rupture
      </h2>
      <div class="card" id="ruptureCard">
       <div class="form">
        <div class="form-row cols-2">
         <label>
          Sheer Force
          <input inputmode="decimal" id="sheerForce" type="text"/>
         </label>
         <label>
          Sheer DMG (%)
          <input inputmode="decimal" id="sheerDmgBonusPct" type="text" value="0"/>
         </label>
        </div>
       </div>
      </div>
     </section>

     <details class="card" id="advancedTab">
      <summary class="summary">
       Advanced
      </summary>
      <div class="form mt-12_5">
       <div class="form-row cols-3">
        <label>
         Allow Anomaly Crit
         <select id="anomAllowCrit">
          <option value="0" selected>Off</option>
          <option value="1">On</option>
         </select>
        </label>
        <label>
         Anomaly Crit Rate (%)
         <input id="anomCritRatePct" max="100" min="0" step="0.1" type="number" value="100"/>
        </label>
        <label>
         Anomaly Crit DMG (%)
         <input id="anomCritDmgPct" min="0" step="0.1" type="number" value="50"/>
        </label>
       </div>
       <div class="form-row cols-1">
        <label class="label-inline">
         <span>Clamp RES Mult</span>
         <input id="clampResMult" type="checkbox"/>
        </label>
       </div>
       <div class="hr tight"></div>
       <div class="form-row cols-1">
        <label>
         Other DMG (%)
         <input id="dmgOtherPct" step="0.1" type="number" value="0"/>
        </label>
       </div>
      </div>
     </details>

     <section class="section-block">
      <h2>
       Enemy
      </h2>
      <div class="card">
       <div class="form">
        <div class="form-row cols-3">
         <label>
          Enemy Level
          <input id="enemyLevel" min="1" step="1" type="number" value="70"/>
         </label>
         <label>
          Enemy DEF
          <input id="enemyDef" min="0" step="1" type="number" value="100"/>
         </label>
         <label>
          All-Attribute RES (%)
          <input id="enemyResAllPct" step="0.1" type="number" value="0"/>
         </label>
        </div>
        <div class="form-row cols-3">
         <label>
          Physical RES (%)
          <input id="enemyResPhysicalPct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          Fire RES (%)
          <input id="enemyResFirePct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          Ice RES (%)
          <input id="enemyResIcePct" step="0.1" type="number" value="0"/>
         </label>
        </div>
        <div class="form-row cols-2">
         <label>
          Electric RES (%)
          <input id="enemyResElectricPct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          Ether RES (%)
          <input id="enemyResEtherPct" step="0.1" type="number" value="0"/>
         </label>
        </div>
        <div class="form-row cols-3">
         <label>
          DEF Reduction (%)
          <input id="defReductionPct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          RES Reduction (%)
          <input id="resReductionPct" step="0.1" type="number" value="0"/>
         </label>
        </div>
        <div class="form-row cols-4">
         <label>
          DMG Taken (%)
          <input id="dmgTakenPct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          Other DMG Taken (%)
          <input id="dmgTakenOtherPct" step="0.1" type="number" value="0"/>
         </label>
         <label>
          Stunned?
          <select id="isStunned">
           <option value="false">
            No
           </option>
           <option value="true">
            Yes
           </option>
          </select>
         </label>
         <label>
          Stunned Multiplier (%)
          <input id="stunPct" step="1" type="number" value="150"/>
         </label>
        </div>
       </div>
      </div>
     </section>
    </div>

    <aside class="panel-right">
     <h2>
      Outputs + Marginal Value
     </h2>
     <div class="card results-card">
      <div class="kpi" id="kpi"></div>
      <div class="hr"></div>
      <div class="table-wrap">
       <table>
        <thead>
         <tr>
          <th>
           Stat
          </th>
          <th>
           Original
          </th>
          <th>
           Applied
          </th>
          <th>
           Sum
          </th>
          <th>
           New Output
          </th>
          <th>
           DMG Gain
          </th>
          <th>
           DMG Gain (%)
          </th>
          <th>
           Efficiency
          </th>
         </tr>
        </thead>
        <tbody id="marginalBody"></tbody>
       </table>
      </div>
     </div>
    </aside>
   </div>
  </div>
  <script defer="" src="app.js"></script>
 </body>
</html>
